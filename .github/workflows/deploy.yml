name: Deploy to Server

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/randy2014/mini-video-pro-backend
  FRONTEND_IMAGE: ghcr.io/randy2014/mini-video-pro-frontend
  SERVER_HOST: 43.161.222.78
  SERVER_USER: ubuntu

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Build with Maven
        run: mvn clean package -DskipTests -q
        working-directory: video-entitlement-server

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: video-entitlement-server
          file: video-entitlement-server/docker/Dockerfile
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:latest,${{ env.BACKEND_IMAGE }}:${{ github.sha }}

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        run: |
          npm install
          npx vite build
        working-directory: video-entitlement-admin

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: video-entitlement-admin
          file: video-entitlement-admin/docker/Dockerfile
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:latest,${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

  deploy:
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ env.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "=== 备部署 ==="
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin
            
            # 停止旧容器
            docker stop video-backend video-frontend 2>/dev/null || true
            docker rm video-backend video-frontend 2>/dev/null || true
            
            # 拉取最新镜像
            docker pull ${{ env.BACKEND_IMAGE }}:latest
            docker pull ${{ env.FRONTEND_IMAGE }}:latest
            
            # 启动后端
            docker run -d --name video-backend --restart always \
              --network video-net \
              -p 8081:8080 \
              -e DB_HOST=video-mysql \
              -e DB_USERNAME=video_user \
              -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -e REDIS_HOST=video-redis \
              -e JWT_ACCESS_SECRET=${{ secrets.JWT_ACCESS_SECRET }} \
              -e JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }} \
              -e ENTITLEMENT_HMAC_KEY=${{ secrets.ENTITLEMENT_HMAC_KEY }} \
              -e SWAGGER_ENABLED=false \
              ${{ env.BACKEND_IMAGE }}:latest
            
            # 启动前端
            docker run -d --name video-frontend --restart always \
              --network video-net \
              -p 8082:80 \
              ${{ env.FRONTEND_IMAGE }}:latest
            
            echo "=== 部署完成 ==="
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" | grep video
