spring:
  application:
    name: video-entitlement-server
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/video_entitlement?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root123}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    table: flyway_schema_history
    baseline-on-migrate: true
    clean-disabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:VideoPro@2024!}
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

server:
  port: ${APP_PORT:8080}

springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED:true}
    path: /api-docs
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:true}
    path: /swagger-ui.html
  packages-to-scan: com.video.entitlement.module

app:
  jwt:
    access-token:
      secret: ${JWT_ACCESS_SECRET:change-me-access-secret-key-must-be-at-least-256-bits}
      expiration-ms: ${JWT_ACCESS_EXPIRATION:1800000}
    refresh-token:
      secret: ${JWT_REFRESH_SECRET:change-me-refresh-secret-key-must-be-at-least-256-bits}
      expiration-ms: ${JWT_REFRESH_EXPIRATION:604800000}
  admin:
    default-username: ${ADMIN_DEFAULT_USERNAME:admin}
    default-password: ${ADMIN_DEFAULT_PASSWORD:Admin@123}
  risk:
    rate-limit:
      default-replenish-rate: 10
      default-burst-capacity: 20
  playback:
    default-max-attempts: 3
    attempt-timeout-seconds: 30
  entitlement-code:
    hmac-key: ${ENTITLEMENT_HMAC_KEY:change-me-hmac-key-for-code-hashing}

logging:
  level:
    root: INFO
    com.video.entitlement: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{requestId}] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
