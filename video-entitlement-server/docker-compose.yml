version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: video-entitlement-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root123}
      MYSQL_DATABASE: video_entitlement
      MYSQL_CHARSET: utf8mb4
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: video-entitlement-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: video-entitlement-server
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-root123}
      DB_HOST: mysql
      REDIS_HOST: redis
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ENTITLEMENT_HMAC_KEY: ${ENTITLEMENT_HMAC_KEY}
      ADMIN_DEFAULT_PASSWORD: ${ADMIN_DEFAULT_PASSWORD:-Admin@123}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-true}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  mysql_data:
  redis_data:
